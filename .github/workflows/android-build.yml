name: Android CI — Build APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Detect Android app module
        id: detect
        run: |
          set -e
          # Try to find a build.gradle(.kts) that applies com.android.application
          file=$(grep -RIl "com.android.application" --exclude-dir=.github --exclude-dir=.gradle --exclude-dir=gradle || true)
          if [ -z "$file" ]; then
            # fallback: find any build.gradle(.kts) under subdirs (common default: app)
            file=$(find . -maxdepth 2 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | head -n 1 || true)
          fi
          if [ -z "$file" ]; then
            echo "No module build.gradle found; defaulting to 'app'"
            module="app"
          else
            dir=$(dirname "$file")
            module=${dir#./}
            if [ -z "$module" ] || [ "$module" = "." ]; then
              module="app"
            fi
          fi
          echo "Detected module: $module"
          echo "module=$module" >> $GITHUB_OUTPUT

      - name: Import release keystore (from secrets)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p ${{ steps.detect.outputs.module }}
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ steps.detect.outputs.module }}/keystore.jks
          echo "MYAPP_RELEASE_STORE_FILE=${{ steps.detect.outputs.module }}/keystore.jks" >> $GITHUB_WORKSPACE/gradle.properties
          echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_WORKSPACE/gradle.properties

      - name: Build Debug APK
        run: ./gradlew :${{ steps.detect.outputs.module }}:assembleDebug --no-daemon

      - name: Build Release APK (only if keystore provided)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew :${{ steps.detect.outputs.module }}:assembleRelease --no-daemon

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            **/build/outputs/**/*.apk
